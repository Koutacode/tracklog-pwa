name: Android Release

on:
  push:
    tags:
      - 'v*' # v1.0.0 のようなタグがプッシュされたら実行

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リリース作成に必要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = require('./package.json');
          const expectedTag = `v${pkg.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;
          if (actualTag !== expectedTag) {
            throw new Error(`Tag ${actualTag} does not match package.json version ${pkg.version}`);
          }
          const gradleProps = fs.readFileSync('android/gradle.properties', 'utf8');
          const versionName = gradleProps.match(/^tracklogVersionName=(.+)$/m)?.[1]?.trim();
          if (versionName !== pkg.version) {
            throw new Error(`Android versionName ${versionName} does not match package.json version ${pkg.version}`);
          }
          console.log(`Release version OK: ${actualTag}`);
          NODE

      - name: Typecheck
        run: npm run typecheck

      - name: Check Content Security Policy
        run: npm run check:csp

      - name: Build Web Asset
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore TrackLog Android debug keystore
        env:
          TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64:-}" ]; then
            echo "::error::TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64 is required for stable APK updates."
            exit 1
          fi
          mkdir -p "$HOME/.android"
          printf '%s' "$TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/debug.keystore"
          chmod 600 "$HOME/.android/debug.keystore"
          keytool -list -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey >/dev/null

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Prepare release APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk tracklog-assist-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tracklog-assist-debug.apk
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
