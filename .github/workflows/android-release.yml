name: Android Release

on:
  push:
    tags:
      - 'v*' # v1.0.0 のようなタグがプッシュされたら実行

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リリース作成に必要
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Supabase Edge Functions
        run: >-
          npx --yes deno check --node-modules-dir=auto --no-lock
          supabase/functions/tracklog-privileged/index.ts
          supabase/functions/tracklog-sync/index.ts
          supabase/functions/tracklog-ic-resolver/index.ts
          supabase/functions/tracklog-location/index.ts

      - name: Validate release version
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');
          const pkg = require('./package.json');
          const expectedTag = `v${pkg.version}`;
          const actualTag = process.env.GITHUB_REF_NAME;
          if (actualTag !== expectedTag) {
            throw new Error(`Tag ${actualTag} does not match package.json version ${pkg.version}`);
          }
          const gradleProps = fs.readFileSync('android/gradle.properties', 'utf8');
          const versionName = gradleProps.match(/^tracklogVersionName=(.+)$/m)?.[1]?.trim();
          const versionCode = Number(gradleProps.match(/^tracklogVersionCode=(.+)$/m)?.[1]?.trim());
          if (versionName !== pkg.version) {
            throw new Error(`Android versionName ${versionName} does not match package.json version ${pkg.version}`);
          }
          if (!Number.isSafeInteger(versionCode) || versionCode <= 0) {
            throw new Error(`Android versionCode is invalid: ${versionCode}`);
          }
          const tags = execFileSync('git', ['tag', '--sort=-v:refname'], { encoding: 'utf8' })
            .split(/\r?\n/)
            .map(value => value.trim())
            .filter(Boolean);
          const previousTag = tags.find(value => value !== actualTag);
          if (previousTag) {
            const previousProps = execFileSync('git', ['show', `${previousTag}:android/gradle.properties`], { encoding: 'utf8' });
            const previousCode = Number(previousProps.match(/^tracklogVersionCode=(.+)$/m)?.[1]?.trim());
            if (Number.isSafeInteger(previousCode) && versionCode <= previousCode) {
              throw new Error(`Android versionCode ${versionCode} must be greater than ${previousTag} (${previousCode})`);
            }
          }
          console.log(`Release version OK: ${actualTag}`);
          NODE

      - name: Validate Supabase build config
        shell: bash
        run: |
          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY are required for release builds."
            exit 1
          fi

      - name: Configure native push build flag
        shell: bash
        env:
          TRACKLOG_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.TRACKLOG_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "${TRACKLOG_GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "VITE_TRACKLOG_NATIVE_PUSH_ENABLED=true" >> "$GITHUB_ENV"
            echo "Native FCM registration enabled for this build."
          else
            echo "VITE_TRACKLOG_NATIVE_PUSH_ENABLED=false" >> "$GITHUB_ENV"
            echo "Native FCM registration disabled because Firebase Android config is not set."
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Logic tests
        run: npm run test:logic

      - name: Sync protocol integration tests
        run: npm run test:sync

      - name: Check Content Security Policy
        run: npm run check:csp

      - name: Build Web Asset
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore Firebase Android config
        env:
          TRACKLOG_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.TRACKLOG_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "${TRACKLOG_GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            printf '%s' "$TRACKLOG_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
            echo "Firebase Android config restored."
          else
            echo "TRACKLOG_GOOGLE_SERVICES_JSON_BASE64 is not set. FCM token registration will be unavailable in this APK."
          fi

      - name: Restore TrackLog Android debug keystore
        env:
          TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64:-}" ]; then
            echo "::error::TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64 is required for stable APK updates."
            exit 1
          fi
          mkdir -p "$HOME/.android"
          printf '%s' "$TRACKLOG_ANDROID_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$HOME/.android/debug.keystore"
          chmod 600 "$HOME/.android/debug.keystore"
          keytool -list -v -keystore "$HOME/.android/debug.keystore" -storepass android -alias androiddebugkey | grep 'SHA256'

      - name: Build Android APK
        env:
          TRACKLOG_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/tracklog-debug.keystore
        run: |
          cp "$HOME/.android/debug.keystore" "$TRACKLOG_ANDROID_KEYSTORE_PATH"
          cd android
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleDebug

      - name: Prepare release APK
        shell: bash
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk tracklog-assist-debug.apk
          AAPT="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          BADGING="$($AAPT dump badging tracklog-assist-debug.apk | head -n 1)"
          EXPECTED_CODE="$(sed -n 's/^tracklogVersionCode=//p' android/gradle.properties | tr -d '\r')"
          echo "$BADGING"
          echo "$BADGING" | grep "name='com.tracklog.assist'"
          echo "$BADGING" | grep "versionCode='$EXPECTED_CODE'"
          echo "$BADGING" | grep "versionName='${GITHUB_REF_NAME#v}'"
          sha256sum tracklog-assist-debug.apk | tee tracklog-assist-debug.apk.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tracklog-assist-debug.apk
            tracklog-assist-debug.apk.sha256
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
