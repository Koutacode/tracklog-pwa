<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ChatGPT用 積み荷管理ミニアプリ</title>
<style>
:root{--bg:#0a0f1a;--card:#111827;--line:#1e3a5f;--text:#e5e7eb;--accent:#fbbf24;--ok:#22c55e;--danger:#ef4444;--btn:#1e3a5f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP',sans-serif}.app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:88px}.head{background:var(--btn);padding:12px;text-align:center;position:sticky;top:0;z-index:5}.title{font-size:18px;font-weight:900}.sub{font-size:11px;opacity:.85;margin-top:2px}.bar{height:7px;background:#0a0f1a;border-radius:999px;overflow:hidden;margin-top:8px}.bar>div{height:100%;background:var(--ok);width:0;transition:.25s}.progress{font-size:10px;margin-top:3px}.next{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#000;padding:12px;margin:8px;border-radius:10px}.next small{display:block;font-weight:900;opacity:.75}.next strong{display:block;margin-top:2px}.tabs{display:flex;position:sticky;top:73px;z-index:4}.tabs button{flex:1;padding:11px;background:#111827;color:var(--text);border:0;border-bottom:2px solid transparent;font-weight:800}.tabs button.active{background:var(--btn);border-bottom-color:var(--accent)}.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin:8px}.row{display:flex;gap:8px;align-items:center;justify-content:space-between}.btn{background:var(--btn);color:var(--text);border:1px solid #2563eb;border-radius:8px;padding:7px 10px;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:4px}.btn-danger{background:#7f1d1d;border-color:var(--danger)}.muted{opacity:.7;font-size:11px}.zone{border:1px solid var(--line);border-radius:10px;padding:12px;margin:6px 8px;min-height:70px;background:#1f2937;color:#fff;font-weight:900}.zone.empty.selecting{border:2px dashed var(--accent)}.zone .meta{font-size:10px;opacity:.75;font-weight:700;margin-bottom:5px}.cargo{padding:9px;border-radius:8px;margin:6px 0;color:#000;font-weight:900;display:flex;gap:8px;justify-content:space-between;align-items:center}.cargo span:first-child{min-width:0}.cargo small{display:block;font-size:10px;opacity:.8;margin-top:2px}.selected-cargo{box-shadow:0 0 0 3px var(--accent),0 0 12px var(--accent)}.schedule{opacity:1;border-left:4px solid transparent}.schedule.done{opacity:.55;border-left-color:var(--ok)}.schedule-title{font-weight:900;font-size:13px}.schedule.done .schedule-title{text-decoration:line-through}.links{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}.modal.show{display:flex}.modalbox{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;max-width:420px;width:100%;max-height:88vh;overflow:auto}textarea{width:100%;min-height:260px;background:#0a0f1a;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ok);color:#fff;border-radius:999px;padding:9px 18px;display:none;z-index:80}.toast.show{display:block}
</style>
</head>
<body>
<div class="app">
<header class="head"><div class="title">📦 ChatGPT用 積み荷管理</div><div class="sub" id="tripSub">テンプレート</div><div class="bar"><div id="progressBar"></div></div><div class="progress" id="progressText">進捗 0/0</div></header>
<section class="next" id="nextBox"></section>
<nav class="tabs"><button class="active" data-tab="load">📦積載図</button><button data-tab="schedule">🗺️予定</button><button data-tab="settings">⚙️設定</button></nav>
<main id="loadTab"><div class="row" style="padding:8px"><div><button class="btn" id="zoneMinus">−</button> <span id="zoneText">ゾーン4</span> <button class="btn" id="zonePlus">＋</button></div><button class="btn" id="copyState">📋状態コピー</button></div><div class="card" style="text-align:center;font-size:10px;opacity:.65">▲ 前方キャブ ▲</div><div id="zones"></div><div class="card" style="text-align:center;font-size:10px;opacity:.65">▼ 後方扉 ▼</div><section class="card"><div style="font-size:12px;margin-bottom:6px">待機中 <span id="selectLabel" style="color:var(--accent)"></span></div><div id="waiting"></div><hr style="border-color:#1e3a5f;border-style:solid;border-width:1px 0 0;margin:12px 0"><div class="muted">積込済一覧</div><div id="loadedList"></div></section></main>
<main id="scheduleTab" style="display:none"><div id="scheduleList"></div></main>
<main id="settingsTab" style="display:none"><section class="card"><div style="font-weight:900;margin-bottom:8px">案件データJSON</div><div class="muted" style="margin-bottom:8px">運行ごとにJSONを差し替えできます。cargo と schedule が必要です。</div><textarea id="jsonInput"></textarea><div class="links"><button class="btn" id="applyJson">反映</button><button class="btn" id="copyJson">JSONコピー</button><button class="btn btn-danger" id="resetAll">初期化</button></div></section></main>
</div>
<div class="modal" id="modal"><div class="modalbox"><div id="modalContent"></div><button class="btn" style="width:100%;justify-content:center;margin-top:12px" id="modalClose">閉じる</button></div></div><div class="toast" id="toast">✓ コピー済</div>
<script>
const PALETTE=['#ef4444','#f59e0b','#eab308','#22c55e','#06b6d4','#3b82f6','#a855f7','#ec4899'];const STORAGE_KEY='chatgpt-truck-loading-manager-v1';
const defaultData={tripLabel:'【テンプレート】積み荷管理',vehicle:'いすゞギガ10tウィング',company:'(株)ほくうん',zones:4,cargo:[{id:1,no:'①',uke:'SAMPLE-001',name:'サンプル荷物A',amount:'10m³ / 1,200kg',status:'待機',zone:null,strict:true,verified:false,loadAddr:'積込先住所を入力',loadTel:'000-0000-0000',dropAddr:'卸先住所を入力',dropTel:'000-0000-0000',dropDate:'4/27',dropTime:'8:00着',memo:'ここに注意事項を書く。'},{id:2,no:'②',uke:'SAMPLE-002',name:'サンプル荷物B',amount:'6m³ / 800kg',status:'待機',zone:null,strict:false,verified:false,loadAddr:'積込先住所を入力',loadTel:'000-0000-0000',dropAddr:'卸先住所を入力',dropTel:'000-0000-0000',dropDate:'4/27',dropTime:'午前',memo:'時間自由・支店入れなど。'}],schedule:[{id:1,type:'積込',date:'4/24',time:'午後',name:'積込先サンプル',addr:'積込先住所',tel:'000-0000-0000',lat:'',lng:'',done:false},{id:2,type:'卸',date:'4/27',time:'8:00着',name:'卸先サンプル',addr:'卸先住所',tel:'000-0000-0000',strict:true,lat:'',lng:'',done:false}]};
let state=loadState(),selectedCargoId=null;function clone(x){return JSON.parse(JSON.stringify(x))}function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):clone(defaultData)}catch{return clone(defaultData)}}function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function color(id){return PALETTE[(Number(id)-1)%PALETTE.length]}function activeCargo(){return state.cargo.filter(c=>c.status!=='卸済')}function parseDate(d){if(!d)return 9999;const[m,day]=String(d).split('/').map(Number);return(m||0)*100+(day||0)}function parseTime(t){t=String(t||'');if(/AM|朝|午前|早朝/.test(t))return 1;if(/PM|夜|午後/.test(t))return 3;return 2}function sortedSchedule(){return[...state.schedule].sort((a,b)=>{if(!!a.done!==!!b.done)return a.done?1:-1;const d=parseDate(a.date)-parseDate(b.date);return d!==0?d:parseTime(a.time)-parseTime(b.time)})}function nextAction(){return sortedSchedule().find(s=>!s.done)}function selectedCargo(){return state.cargo.find(c=>c.id===selectedCargoId)}
function render(){save();document.getElementById('tripSub').textContent=`${state.vehicle}｜${state.company}`;document.getElementById('zoneText').textContent=`ゾーン${state.zones}`;const loaded=activeCargo().filter(c=>c.zone).length,total=activeCargo().length,pct=total?Math.round(loaded/total*100):0;document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressText').textContent=`進捗 ${loaded}/${total} (${pct}%) 💾保存済`;const n=nextAction();document.getElementById('nextBox').innerHTML=n?`<small>▶ 次のアクション</small><strong>${esc(n.type)} ${esc(n.date)} ${esc(n.time)}</strong><div style="font-size:12px;margin-top:2px">${esc(n.name)}</div><div style="font-size:10px;opacity:.75;margin-top:2px">${esc(n.addr)}</div>`:`<small>▶ 次のアクション</small><strong>未完了予定なし</strong>`;const zones=document.getElementById('zones');zones.innerHTML='';for(let z=1;z<=state.zones;z++){const items=state.cargo.filter(c=>c.zone===z&&c.status!=='卸済'),primary=items[0],div=document.createElement('div');div.className='zone'+(selectedCargoId&&!items.length?' empty selecting':'');div.style.background=primary?color(primary.id):'#1f2937';div.onclick=()=>place(z);div.innerHTML=`<div class="meta">ゾーン${z}${items.length>1?` (${items.length}件相積み)`:''}${selectedCargoId&&!items.length?' ← ここへ配置':''}</div>`+items.map((c,i)=>`<div style="border-top:${i>0?'1px dashed rgba(255,255,255,.35)':'0'};padding-top:${i>0?'6px':'0'}">${esc(c.no)}${esc(c.name)} ${esc(c.amount)} ${c.verified?'✓':''}<small>${c.strict?'🔴':'🔵'} 卸:${esc(c.dropDate)} ${esc(c.dropTime)}</small></div>`).join('');zones.appendChild(div)}const sel=selectedCargo();document.getElementById('selectLabel').textContent=sel?`（⏳${sel.no}${sel.name} 選択中）`:'';document.getElementById('waiting').innerHTML=state.cargo.filter(c=>!c.zone&&c.status==='待機').map(c=>`<div class="cargo ${selectedCargoId===c.id?'selected-cargo':''}" style="background:${color(c.id)}" onclick="selectCargo(${c.id})"><span>${selectedCargoId===c.id?'⏳ ':''}${c.strict?'🔴':'🔵'} ${esc(c.no)}${esc(c.name)} ${esc(c.amount)} ${c.verified?'✓':''}</span><span class="row" style="gap:3px"><button class="btn" onclick="event.stopPropagation();showDetail(${c.id})">ℹ️</button><button class="btn btn-danger" onclick="event.stopPropagation();finishCargo(${c.id})">卸済</button></span></div>`).join('')||'<div class="muted">待機中なし</div>';document.getElementById('loadedList').innerHTML=state.cargo.filter(c=>c.zone&&c.status!=='卸済').map(c=>`<div class="row" style="font-size:12px;padding:5px 0"><span onclick="selectCargo(${c.id})">${selectedCargoId===c.id?'⏳ ':''}Z${c.zone}: ${esc(c.no)}${esc(c.name)} ${c.strict?'🔴':'🔵'}</span><span><button class="btn" onclick="showDetail(${c.id})">ℹ️</button> <button class="btn" onclick="unloadCargo(${c.id})">✕降ろす</button></span></div>`).join('')||'<div class="muted">積込済なし</div>';document.getElementById('scheduleList').innerHTML=sortedSchedule().map(s=>{const href=s.lat&&s.lng?`https://www.google.com/maps?q=${encodeURIComponent(s.lat+','+s.lng)}`:`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.addr||s.name)}`;return`<section class="card schedule ${s.done?'done':''}"><div class="row" style="align-items:flex-start"><div style="min-width:0"><div class="muted">${esc(s.type)} ${esc(s.date)} ${esc(s.time)} ${s.type==='卸'?(s.strict?'🔴厳守':'🔵自由'):''}</div><div class="schedule-title">${esc(s.name)}</div><div style="font-size:12px;opacity:.9">${esc(s.addr)}</div></div><button class="btn" style="font-size:18px;min-width:52px;justify-content:center;background:${s.done?'#22c55e':'#1f2937'}" onclick="toggleDone(${s.id})">${s.done?'✅':'○'}</button></div><div class="links"><a class="btn" href="${href}" target="_blank">📍マップ</a><button class="btn" onclick="copyText('${esc(String(s.tel||'')).replaceAll("'","\\'")}')">📞${esc(s.tel||'')}</button><button class="btn" onclick="copyText('${esc(String(s.addr||'')).replaceAll("'","\\'")}')">📋住所</button></div></section>`}).join('');document.getElementById('jsonInput').value=JSON.stringify(state,null,2)}
function selectCargo(id){selectedCargoId=selectedCargoId===id?null:id;render()}function place(z){if(!selectedCargoId)return;state.cargo=state.cargo.map(c=>c.id===selectedCargoId?{...c,zone:z,status:'積込済'}:c);selectedCargoId=null;render()}function unloadCargo(id){state.cargo=state.cargo.map(c=>c.id===id?{...c,zone:null,status:'待機'}:c);render()}function finishCargo(id){const c=state.cargo.find(x=>x.id===id);if(!confirm(`${c?.no||''}${c?.name||''} を卸済にしますか？`))return;state.cargo=state.cargo.map(c=>c.id===id?{...c,zone:null,status:'卸済'}:c);render()}function toggleDone(id){state.schedule=state.schedule.map(s=>s.id===id?{...s,done:!s.done}:s);render()}function showDetail(id){const c=state.cargo.find(x=>x.id===id);if(!c)return;document.getElementById('modalContent').innerHTML=`<div style="font-weight:900;margin-bottom:8px">${esc(c.no)}${esc(c.name)} ${c.verified?'✓検証済':''}</div><div style="font-size:12px;line-height:1.65"><div>受番: ${esc(c.uke)}</div><div>荷量: ${esc(c.amount)}</div><div>卸: ${esc(c.dropDate)} ${esc(c.dropTime)} ${c.strict?'🔴現地厳守':'🔵自由'}</div><div style="margin-top:8px;opacity:.8">${esc(c.memo)}</div><div style="margin-top:10px" class="muted">積込先</div><div>${esc(c.loadAddr)}</div><button class="btn" onclick="copyText('${esc(String(c.loadTel||'')).replaceAll("'","\\'")}')">📞${esc(c.loadTel||'')}</button><div style="margin-top:10px" class="muted">卸先</div><div>${esc(c.dropAddr)}</div><button class="btn" onclick="copyText('${esc(String(c.dropTel||'')).replaceAll("'","\\'")}')">📞${esc(c.dropTel||'')}</button></div>`;document.getElementById('modal').classList.add('show')}async function copyText(t){try{await navigator.clipboard.writeText(t);showToast()}catch{document.getElementById('modalContent').innerHTML=`<div>手動コピーしてください</div><textarea>${esc(t)}</textarea>`;document.getElementById('modal').classList.add('show')}}function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400)}
document.querySelectorAll('.tabs button').forEach(btn=>{btn.onclick=()=>{document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const tab=btn.dataset.tab;document.getElementById('loadTab').style.display=tab==='load'?'':'none';document.getElementById('scheduleTab').style.display=tab==='schedule'?'':'none';document.getElementById('settingsTab').style.display=tab==='settings'?'':'none'}});document.getElementById('zoneMinus').onclick=()=>{state.zones=Math.max(2,state.zones-1);render()};document.getElementById('zonePlus').onclick=()=>{state.zones=Math.min(10,state.zones+1);render()};document.getElementById('copyState').onclick=()=>{const now=new Date(),lines=[state.tripLabel,`【積載状況】${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}時点`,`進捗:${activeCargo().filter(c=>c.zone).length}/${activeCargo().length}`,''];for(let z=1;z<=state.zones;z++){const items=state.cargo.filter(c=>c.zone===z&&c.status!=='卸済');lines.push(items.length?`ゾーン${z}: ${items.map(c=>`${c.no}${c.name} ${c.amount}`).join('＋')}`:`ゾーン${z}: 空`)}const wait=state.cargo.filter(c=>!c.zone&&c.status==='待機');if(wait.length)lines.push('','【待機】',...wait.map(c=>`${c.no}${c.name} ${c.amount}`));const done=state.cargo.filter(c=>c.status==='卸済');if(done.length)lines.push('','【卸済】',...done.map(c=>`✅${c.no}${c.name}`));const n=nextAction();if(n)lines.push('',`▶次:${n.type} ${n.date} ${n.time} ${n.name}`);copyText(lines.join('\n'))};document.getElementById('applyJson').onclick=()=>{try{const p=JSON.parse(document.getElementById('jsonInput').value);if(!p.cargo||!p.schedule)throw new Error('cargo/schedule がありません');state=p;render();alert('反映しました')}catch(e){alert('JSONの形式を確認してください: '+e.message)}};document.getElementById('copyJson').onclick=()=>copyText(JSON.stringify(state,null,2));document.getElementById('resetAll').onclick=()=>{if(confirm('保存データを初期化しますか？')){state=clone(defaultData);selectedCargoId=null;render()}};document.getElementById('modalClose').onclick=()=>document.getElementById('modal').classList.remove('show');document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')document.getElementById('modal').classList.remove('show')};render();
</script>
</body>
</html>
